{% extends 'base.html' %}
{% block content %}
<div class="grid md:grid-cols-2 gap-8">
  <form id="registerForm" class="glass p-8 rounded-3xl space-y-4">
    <h2 class="text-3xl font-bold">Register Voter</h2>
    <input name="name" placeholder="Full name" class="input" required />
    <input name="email" type="email" placeholder="Email" class="input" required />
    <input name="password" type="password" placeholder="Password" class="input" required />
    <button type="button" onclick="openWebcam('register')" class="btn-secondary w-full">Capture Face</button>
    <button class="btn-primary w-full">Create Account</button>
  </form>
  <div class="glass p-8 rounded-3xl">
    <h3 class="text-xl font-semibold mb-4">Security Layers</h3>
    <ul class="list-disc list-inside text-slate-300 space-y-2">
      <li>Encrypted facial embeddings with Fernet.</li>
      <li>bcrypt password hashing.</li>
      <li>JWT sessions and OTP second factor.</li>
    </ul>
  </div>
</div>
{% include 'partials/webcam_modal.html' %}
{% endblock %}
