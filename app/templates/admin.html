{% extends 'base.html' %}
{% block content %}
<div class="grid lg:grid-cols-2 gap-6">
  <section class="glass p-6 rounded-3xl">
    <h2 class="text-2xl font-bold mb-3">Add Candidate</h2>
    <form id="candidateForm" class="space-y-3">
      <input name="name" placeholder="Candidate Name" class="input" required />
      <input name="party_symbol" placeholder="Party Symbol URL" class="input" required />
      <button class="btn-primary">Add</button>
    </form>
  </section>
  <section class="glass p-6 rounded-3xl">
    <h2 class="text-2xl font-bold mb-3">Election Control</h2>
    <form id="electionForm" class="space-y-3">
      <input name="start_time" type="datetime-local" class="input" required />
      <input name="end_time" type="datetime-local" class="input" required />
      <label class="flex items-center gap-2"><input type="checkbox" name="is_active" /> Active</label>
      <button class="btn-primary">Update Window</button>
    </form>
  </section>
</div>
<section class="glass p-6 rounded-3xl mt-6">
  <h2 class="text-2xl font-bold mb-3">Statistics</h2>
  <canvas id="statsChart" height="120"></canvas>
</section>
<section class="glass p-6 rounded-3xl mt-6">
  <h2 class="text-2xl font-bold mb-3">Audit Logs</h2>
  <pre id="auditLogs" class="text-xs overflow-auto max-h-80"></pre>
</section>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}
